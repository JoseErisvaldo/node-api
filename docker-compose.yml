version: "3.9"
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=development
      - PORT=3333
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=finance_api
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=supersecretjwtkey
    ports:
      - "3333:3333"
    depends_on:
      - db
    volumes:
      - .:/usr/src/app
      - node_modules:/usr/src/app/node_modules
    command: sh -c "sleep 8 && npm run sequelize:migrate && npm run sequelize:seed && npm run dev"
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_api
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data:
  node_modules:
